<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="基于荣格《心理类型》与迈尔斯《天生不同》理论，免费 MBTI 性格测试。探索你的认知功能与人格类型。">
  <meta property="og:title" content="MBTI 性格测试 — 发现你的真实人格">
  <meta property="og:description" content="基于荣格心理学理论，探索16种人格类型。不再非黑即白，5级量表更精准。">
  <meta property="og:type" content="website">
  <title>MBTI 性格测试 — 发现你的真实人格</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============ 浅色活力系 CSS 变量 ============ */
    :root {
      --bg-base: #FBF9F6;
      --bg-surface: #FFFFFF;
      --bg-elevated: #F7F5F2;
      --bg-card: rgba(255,255,255,0.85);
      --gold: #B8943E;
      --gold-hover: #C9A850;
      --gold-light: rgba(184,148,62,0.08);
      --gold-glow: rgba(184,148,62,0.15);
      --gold-border: rgba(184,148,62,0.35);
      --text-primary: #1E1E2A;
      --text-secondary: #5A5A6E;
      --text-muted: #9A9AA8;
      --border-subtle: rgba(0,0,0,0.06);
      --border-card: rgba(0,0,0,0.10);
      --shadow-sm: 0 2px 12px rgba(0,0,0,0.04);
      --shadow-md: 0 6px 24px rgba(0,0,0,0.06);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
      --font-serif: 'Playfair Display','Noto Serif SC','STSong','Songti SC',serif;
      --font-sans: 'Inter','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
      --transition-fast: 0.2s ease;
      --transition-smooth: 0.4s cubic-bezier(0.4,0,0.2,1);
      --nt-color: #6B5CBF;
      --nf-color: #1EA896;
      --sj-color: #3B6DC0;
      --sp-color: #D48830;
      --container-max: 720px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}

    body{
      background:
        radial-gradient(ellipse 60% 50% at 10% 0%, rgba(220,210,235,0.25) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 90% 100%, rgba(200,215,235,0.25) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(235,225,210,0.15) 0%, transparent 60%),
        linear-gradient(175deg, #FBF9F6 0%, #F7F3F2 20%, #F5F2F0 40%, #F4F3F7 60%, #F6F4F6 80%, #FBF9F6 100%);
      background-attachment:fixed;
      min-height:100vh;
      color:var(--text-primary);
      font-family:var(--font-sans);
      font-weight:400;
      line-height:1.7;
      -webkit-font-smoothing:antialiased;
      position:relative;
    }

    /* 微妙的装饰性几何元素 */
    body::before{
      content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(1px 1px at 20% 15%, rgba(120,100,160,0.15), transparent),
        radial-gradient(1px 1px at 70% 20%, rgba(180,140,80,0.12), transparent),
        radial-gradient(1px 1px at 50% 70%, rgba(100,140,180,0.12), transparent),
        radial-gradient(1px 1px at 30% 85%, rgba(160,120,140,0.10), transparent),
        radial-gradient(1px 1px at 80% 60%, rgba(180,150,100,0.10), transparent),
        radial-gradient(1px 1px at 15% 50%, rgba(130,160,180,0.08), transparent),
        radial-gradient(2px 2px at 60% 35%, rgba(150,130,170,0.08), transparent);
      animation:gentleShift 12s ease-in-out infinite alternate;
    }
    @keyframes gentleShift{0%{opacity:.5}50%{opacity:.9}100%{opacity:.6}}
    body>*{position:relative;z-index:1}

    .serif{font-family:var(--font-serif);font-weight:400}
    h1,h2,h3,.headline{font-family:var(--font-serif);font-weight:400;line-height:1.15}
    .text-gold{color:var(--gold)}.text-secondary{color:var(--text-secondary)}.text-muted{color:var(--text-muted)}

    /* ============ 布局 ============ */
    .section{display:none;min-height:100vh;padding:60px 24px}
    .section.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
    #section-types.active,#section-detail.active{justify-content:flex-start;padding-top:40px;padding-bottom:80px}
    .container{width:100%;max-width:var(--container-max);margin:0 auto}
    #section-types .container,#section-detail .container{max-width:960px}
    .text-center{text-align:center}

    /* ============ 按钮 ============ */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 32px;border:none;border-radius:50px;font-family:var(--font-sans);font-size:15px;font-weight:500;letter-spacing:.04em;cursor:pointer;transition:all var(--transition-fast);text-decoration:none;outline:none}
    .btn-gold{background:var(--gold);color:#fff}
    .btn-gold:hover{background:var(--gold-hover);transform:translateY(-1px);box-shadow:0 6px 24px rgba(184,148,62,.3)}
    .btn-gold:active{transform:translateY(0)}
    .btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border-card)}
    .btn-ghost:hover{color:var(--text-primary);border-color:rgba(0,0,0,.25);background:rgba(0,0,0,.02)}
    .btn-outline-gold{background:transparent;color:var(--gold);border:1.5px solid var(--gold-border);border-radius:50px}
    .btn-outline-gold:hover{background:var(--gold-light);border-color:var(--gold)}
    .btn-large{padding:15px 40px;font-size:16px;letter-spacing:.05em}
    .btn-back{background:transparent;color:var(--text-secondary);border:none;padding:10px 0;font-size:14px;letter-spacing:.04em;cursor:pointer;transition:color var(--transition-fast);display:inline-flex;align-items:center;gap:6px}
    .btn-back:hover{color:var(--text-primary)}
    .btn-back::before{content:'←';font-size:15px}

    /* ============ HERO 首页 ============ */
    #section-hero{display:flex}
    .hero-content{text-align:center;position:relative;padding:20px 0}

    /* 中心装饰图形 */
    .hero-emblem{
      width:80px;height:80px;margin:0 auto 32px;position:relative;
      animation:emblemFloat 6s ease-in-out infinite;
    }
    .hero-emblem::before{
      content:'';position:absolute;inset:0;border-radius:50%;
      background:radial-gradient(circle,var(--gold-light) 0%,transparent 70%);
      animation:emblemPulse 3s ease-in-out infinite;
    }
    .hero-emblem-inner{
      width:80px;height:80px;border-radius:50%;
      border:2px solid var(--gold-border);
      display:flex;align-items:center;justify-content:center;
      font-size:32px;position:relative;z-index:1;
      background:var(--bg-surface);box-shadow:var(--shadow-sm);
    }
    @keyframes emblemFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes emblemPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.5);opacity:0}}
    .hero-eyebrow{display:inline-block;padding:5px 18px;border:1px solid var(--gold-border);border-radius:100px;font-size:12px;letter-spacing:.1em;color:var(--gold);margin-bottom:24px;font-weight:500;text-transform:uppercase}
    .hero-headline{font-size:clamp(2rem,6vw,3.5rem);margin-bottom:12px;letter-spacing:-.01em;color:var(--text-primary)}
    .hero-headline .accent{color:var(--gold)}
    .hero-sub{font-size:16px;color:var(--text-secondary);max-width:420px;margin:0 auto 36px;line-height:1.7}

    /* 模式选择卡片 */
    .test-mode-selector{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:28px}
    .test-mode-card{
      background:var(--bg-surface);backdrop-filter:blur(8px);
      border:1.5px solid var(--border-subtle);border-radius:12px;
      padding:18px 22px;cursor:pointer;transition:all var(--transition-fast);
      text-align:center;min-width:180px;flex:1;max-width:250px;
      box-shadow:var(--shadow-sm);
    }
    .test-mode-card:hover{border-color:var(--gold-border);box-shadow:var(--shadow-md);transform:translateY(-1px)}
    .test-mode-card.selected{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-light),var(--shadow-md)}
    .test-mode-card .mode-icon{font-size:24px;margin-bottom:6px;display:block}
    .test-mode-card h3{font-size:15px;margin-bottom:4px;letter-spacing:.03em;color:var(--text-primary)}
    .test-mode-card p{font-size:12px;color:var(--text-muted);line-height:1.5}
    .hero-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

    /* ============ 选项栏（5级量表） ============ */
    .quiz-options{display:flex;flex-direction:column;gap:10px;width:100%;margin-bottom:36px}
    .quiz-option{
      display:flex;align-items:center;padding:16px 20px;
      background:var(--bg-surface);border:1.5px solid var(--border-subtle);
      border-radius:10px;cursor:pointer;transition:all var(--transition-fast);
      font-size:14px;color:var(--text-secondary);text-align:left;line-height:1.5;
      box-shadow:var(--shadow-sm);
      gap:14px;
    }
    .quiz-option:hover{border-color:var(--gold-border);background:var(--bg-elevated);color:var(--text-primary)}
    .quiz-option.selected{border-color:var(--gold);color:var(--text-primary);background:var(--gold-light);box-shadow:0 0 0 2px var(--gold-light),var(--shadow-sm)}
    .quiz-option-marker{
      width:20px;height:20px;border-radius:50%;border:2px solid var(--border-card);
      flex-shrink:0;transition:all var(--transition-fast);
      display:flex;align-items:center;justify-content:center;
    }
    .quiz-option.selected .quiz-option-marker{border-color:var(--gold);background:var(--gold)}
    .quiz-option.selected .quiz-option-marker::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff}
    .quiz-option-label{font-size:11px;color:var(--text-muted);letter-spacing:.04em;flex-shrink:0;width:40px;text-align:center}

    @media(min-width:768px){
      .quiz-option{padding:18px 22px;font-size:15px}
    }

    /* ============ 进度条 ============ */
    .quiz-progress-wrap{width:100%;margin-bottom:40px}
    .quiz-progress-bar{width:100%;height:3px;background:var(--border-subtle);border-radius:3px;overflow:hidden}
    .quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-hover));width:0%;transition:width var(--transition-smooth);border-radius:3px}
    .quiz-progress-text{display:flex;justify-content:space-between;margin-top:10px;font-size:12px;letter-spacing:.06em;color:var(--text-muted)}
    .quiz-dimension-tag{display:inline-block;padding:3px 12px;border-radius:100px;font-size:11px;letter-spacing:.06em;margin-bottom:14px;color:var(--text-muted);border:1px solid var(--border-subtle);background:var(--bg-surface)}
    .quiz-question-area{width:100%;margin-bottom:28px;min-height:50px;transition:opacity .3s ease,transform .3s ease}
    .quiz-question-area.fading{opacity:0;transform:translateY(8px)}
    .quiz-question-text{font-family:var(--font-serif);font-size:clamp(1.2rem,3vw,1.5rem);font-weight:400;line-height:1.45;text-align:center;color:var(--text-primary)}
    .quiz-nav{display:flex;gap:12px;align-items:center;justify-content:center}

    /* ============ 结果页 ============ */
    .result-type-badge{font-family:var(--font-serif);font-size:clamp(3rem,9vw,6rem);letter-spacing:.1em;color:var(--text-primary);margin-bottom:4px;line-height:1}
    .result-nickname{font-family:var(--font-serif);font-size:1.2rem;color:var(--gold);margin-bottom:4px;letter-spacing:.03em}
    .result-group{display:inline-block;padding:3px 14px;border-radius:100px;font-size:11px;letter-spacing:.06em;margin-bottom:24px;font-weight:500}
    .result-group.nt{background:rgba(107,92,191,.1);color:var(--nt-color);border:1px solid rgba(107,92,191,.25)}
    .result-group.nf{background:rgba(30,168,150,.1);color:var(--nf-color);border:1px solid rgba(30,168,150,.25)}
    .result-group.sj{background:rgba(59,109,192,.1);color:var(--sj-color);border:1px solid rgba(59,109,192,.25)}
    .result-group.sp{background:rgba(212,136,48,.1);color:var(--sp-color);border:1px solid rgba(212,136,48,.25)}
    .result-description{font-size:15px;color:var(--text-secondary);line-height:1.85;margin-bottom:28px;max-width:520px}
    .result-dimensions{width:100%;margin-bottom:24px}
    .dimension-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .dimension-label{font-size:12px;letter-spacing:.04em;width:48px;flex-shrink:0}
    .dimension-label.left{text-align:right;color:var(--gold);font-weight:500}
    .dimension-label.right{text-align:left;color:var(--text-secondary)}
    .dimension-bar-wrap{flex:1;height:5px;background:var(--border-subtle);border-radius:5px;overflow:hidden;display:flex}
    .dimension-bar-fill{height:100%;border-radius:5px;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
    .dimension-bar-fill.dom-bar{background:var(--gold)}
    .dimension-bar-fill.muted{background:rgba(0,0,0,0.06)}
    .result-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

    /* 功能栈 */
    .func-stack{width:100%;margin-bottom:20px}
    .func-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;padding:8px 14px;background:var(--bg-elevated);border-radius:6px}
    .func-pos{font-size:11px;color:var(--text-muted);width:65px;flex-shrink:0;letter-spacing:.03em}
    .func-name{font-weight:600;font-size:13px;width:44px;flex-shrink:0}
    .func-bar-wrap{flex:1;height:3px;background:var(--border-subtle);border-radius:3px;overflow:hidden}
    .func-bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
    .func-bar-fill.dom{background:var(--gold)}.func-bar-fill.aux{background:rgba(184,148,62,.6)}
    .func-bar-fill.ter{background:rgba(184,148,62,.35)}.func-bar-fill.inf{background:rgba(0,0,0,0.08)}

    /* 解锁卡片 */
    .result-locked-card{width:100%;padding:24px 20px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:10px;text-align:center;box-shadow:var(--shadow-sm)}
    .result-locked-card .lock-icon{font-size:24px;margin-bottom:10px;opacity:.4}
    .result-locked-card h3{font-size:15px;color:var(--text-secondary);margin-bottom:6px;letter-spacing:.03em}
    .result-locked-card p{font-size:13px;color:var(--text-muted);line-height:1.6}
    .badge-coming{display:inline-block;padding:3px 12px;border:1px solid var(--gold-border);border-radius:100px;font-size:11px;color:var(--gold);letter-spacing:.08em;margin-top:10px}

    /* ============ 16型网格 ============ */
    .types-header{text-align:center;margin-bottom:36px}
    .types-header .section-label{display:inline-block;padding:4px 16px;border:1px solid var(--gold-border);border-radius:100px;font-size:11px;letter-spacing:.1em;color:var(--gold);margin-bottom:18px;font-weight:500}
    .types-header h2{font-size:clamp(1.8rem,4vw,2.5rem);margin-bottom:8px}
    .types-header p{color:var(--text-secondary);font-size:14px;max-width:460px;margin:0 auto}
    .types-grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:600px){.types-grid{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:900px){.types-grid{grid-template-columns:repeat(3,1fr)}}
    @media(min-width:1100px){.types-grid{grid-template-columns:repeat(4,1fr)}}
    .type-card{
      background:var(--bg-surface);border:1px solid var(--border-subtle);
      border-radius:10px;padding:20px 16px;cursor:pointer;transition:all .3s ease;
      position:relative;box-shadow:var(--shadow-sm);
    }
    .type-card:hover{border-color:var(--gold-border);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
    .type-card-emoji{font-size:28px;margin-bottom:8px;display:block}
    .type-card-code{font-family:var(--font-serif);font-size:18px;letter-spacing:.08em;color:var(--text-primary);margin-bottom:2px}
    .type-card-nickname{font-size:12px;color:var(--gold);letter-spacing:.04em;margin-bottom:8px;font-weight:500}
    .type-card-desc{font-size:12px;color:var(--text-muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .type-card .card-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:16px;opacity:0;transition:all .3s ease}
    .type-card:hover .card-arrow{opacity:1;right:10px}
    .types-back-row{margin-bottom:24px;width:100%;max-width:960px}

    /* ============ 类型详情 ============ */
    #section-detail .detail-header{text-align:center;margin-bottom:28px;width:100%}
    .detail-back-row{margin-bottom:20px;width:100%;max-width:960px}
    .detail-type-badge{font-family:var(--font-serif);font-size:clamp(2.5rem,7vw,4.5rem);letter-spacing:.1em;margin-bottom:2px}
    .detail-nickname{font-size:1.1rem;color:var(--gold);letter-spacing:.04em;margin-bottom:6px}
    .detail-illustration{width:100%;max-width:400px;height:180px;margin:0 auto 28px;display:flex;align-items:center;justify-content:center;border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm)}
    .detail-illustration svg{width:100%;height:100%}
    .detail-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:28px}
    @media(min-width:768px){.detail-grid{grid-template-columns:1fr 1fr}}
    .detail-card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:10px;padding:22px;box-shadow:var(--shadow-sm)}
    .detail-card h3{font-size:16px;margin-bottom:12px;letter-spacing:.03em;display:flex;align-items:center;gap:8px;color:var(--text-primary)}
    .detail-card h3 .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0}
    .detail-card p,.detail-card li{font-size:13px;color:var(--text-secondary);line-height:1.75}
    .detail-card ul{list-style:none;padding:0}
    .detail-card li::before{content:'— ';color:var(--text-muted)}
    .detail-card.full-width{grid-column:1/-1}
    .detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .detail-tag{padding:4px 12px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:100px;font-size:11px;color:var(--text-secondary)}

    /* ============ Toast ============ */
    .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text-primary);color:#fff;padding:11px 24px;border-radius:100px;font-size:13px;opacity:0;transition:all .4s cubic-bezier(.16,1,.3,1);z-index:1000;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ============ Footer ============ */
    .site-footer{text-align:center;padding:28px 24px;border-top:1px solid var(--border-subtle)}
    .site-footer p{font-size:11px;color:var(--text-muted);letter-spacing:.03em}

    /* ============ 动画 ============ */
    @keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .animate-in{animation:fadeInUp .55s cubic-bezier(.16,1,.3,1) forwards}
    .delay-1{animation-delay:.04s;opacity:0}.delay-2{animation-delay:.12s;opacity:0}
    .delay-3{animation-delay:.24s;opacity:0}.delay-4{animation-delay:.38s;opacity:0}
    .type-card{opacity:0;animation:fadeInUp .45s ease forwards}
    .type-card:nth-child(1){animation-delay:.01s}.type-card:nth-child(2){animation-delay:.04s}
    .type-card:nth-child(3){animation-delay:.07s}.type-card:nth-child(4){animation-delay:.10s}
    .type-card:nth-child(5){animation-delay:.13s}.type-card:nth-child(6){animation-delay:.16s}
    .type-card:nth-child(7){animation-delay:.19s}.type-card:nth-child(8){animation-delay:.22s}
    .type-card:nth-child(9){animation-delay:.25s}.type-card:nth-child(10){animation-delay:.28s}
    .type-card:nth-child(11){animation-delay:.31s}.type-card:nth-child(12){animation-delay:.34s}
    .type-card:nth-child(13){animation-delay:.37s}.type-card:nth-child(14){animation-delay:.40s}
    .type-card:nth-child(15){animation-delay:.43s}.type-card:nth-child(16){animation-delay:.46s}

    @media(min-width:768px){
      .section{padding:70px 36px}
      #section-types.active,#section-detail.active{padding-top:50px;padding-bottom:90px}
    }
    @media(max-width:380px){
      .hero-headline{font-size:1.7rem}
      .quiz-option{padding:14px 16px;font-size:13px;gap:10px}
      .btn-large{padding:13px 30px;font-size:14px}
      .test-mode-card{min-width:140px;padding:14px 16px}
    }
  </style>
</head>
<body>

<!-- ===== HERO ===== -->
<section id="section-hero" class="section active">
  <div class="container">
    <div class="hero-content">
      <!-- 视觉焦点：浮动的徽章 -->
      <div class="hero-emblem animate-in delay-1">
        <div class="hero-emblem-inner">🧬</div>
      </div>
      <div class="hero-eyebrow animate-in delay-1">基于荣格 & 迈尔斯理论</div>
      <h1 class="hero-headline animate-in delay-2">

// 获取当前题库
// ============================================================
function getQuestions(){return testMode==='full'?fullQuestions:conciseQuestions}

function showSection(section){
  [sectionHero,sectionQuiz,sectionResults,sectionTypes,sectionDetail].forEach(s=>s.classList.remove('active'));
  section.classList.add('active');
}

// ============================================================
// 渲染题目
// ============================================================
function renderQuestion(index){
  const questions=getQuestions(),q=questions[index];
  const questionArea=document.getElementById('question-area'),
    optionsContainer=document.getElementById('options-container'),
    btnPrev=document.getElementById('btn-prev'),btnNext=document.getElementById('btn-next'),
    dimTag=document.getElementById('dimension-tag');
  questionArea.classList.add('fading');
  setTimeout(()=>{
    document.getElementById('question-text').textContent=q.text;
    const dimLabels={EI:'外向 E ↔ I 内向',SN:'实感 S ↔ N 直觉',TF:'思考 T ↔ F 情感',JP:'判断 J ↔ P 感知',
      Te:'外倾思维 Te',Ti:'内倾思维 Ti',Fe:'外倾情感 Fe',Fi:'内倾情感 Fi',
      Se:'外倾感觉 Se',Si:'内倾感觉 Si',Ne:'外倾直觉 Ne',Ni:'内倾直觉 Ni'};
    dimTag.textContent=dimLabels[q.dimension]||q.dimension;
    // 5选项的标签
    const optLabels=['强烈同意','偏向同意','中立 / 两者都有','偏向同意','强烈同意'];
    optionsContainer.innerHTML='';
    q.options.forEach((opt,optIndex)=>{
      const btn=document.createElement('div');btn.className='quiz-option';
      btn.innerHTML=`<div class="quiz-option-marker"></div><span>${opt.text}</span>`;
      const existingAnswer=answers.find(a=>a.questionId===q.id);
      if(existingAnswer&&optIndex===q.options.findIndex(o=>JSON.stringify(o.score)===JSON.stringify(existingAnswer.selectedScore))){btn.classList.add('selected')}
      btn.addEventListener('click',()=>selectOption(index,optIndex));
      optionsContainer.appendChild(btn);
    });
    questionArea.classList.remove('fading');
    updateProgress(index);
    btnPrev.style.visibility=index===0?'hidden':'visible';
    btnNext.textContent=index===questions.length-1?'查看结果':'下一题 →';
    sectionQuiz.scrollIntoView({behavior:'smooth',block:'start'});
  },180);
}

function selectOption(questionIndex,optionIndex){
  const questions=getQuestions(),q=questions[questionIndex];
  const existingIndex=answers.findIndex(a=>a.questionId===q.id);
  const answer={questionId:q.id,selectedScore:q.options[optionIndex].score};
  if(existingIndex>=0)answers[existingIndex]=answer;else answers.push(answer);
  document.querySelectorAll('.quiz-option').forEach((opt,i)=>opt.classList.toggle('selected',i===optionIndex));
  if(questionIndex<questions.length-1){setTimeout(()=>{currentIndex=questionIndex+1;renderQuestion(currentIndex)},400)}
}

function updateProgress(index){
  const questions=getQuestions(),total=questions.length,pct=Math.round((index/total)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-label').textContent=`第 ${index+1} / ${total} 题`;
  document.getElementById('progress-pct').textContent=pct+'%';
}

// ============================================================
// 导航事件
// ============================================================
document.getElementById('btn-next').addEventListener('click',()=>{
  const questions=getQuestions();
  const currentAnswer=answers.find(a=>a.questionId===questions[currentIndex].id);
  if(!currentAnswer){shakeElement(document.getElementById('options-container'));return}
  if(currentIndex===questions.length-1)showResults();else{currentIndex++;renderQuestion(currentIndex)}
});
document.getElementById('btn-prev').addEventListener('click',()=>{if(currentIndex>0){currentIndex--;renderQuestion(currentIndex)}});
function shakeElement(el){el.style.transition='transform .1s ease';el.style.transform='translateX(-3px)';setTimeout(()=>{el.style.transform='translateX(3px)'},80);setTimeout(()=>{el.style.transform='translateX(-2px)'},160);setTimeout(()=>{el.style.transform='translateX(0)'},240)}

// ============================================================
// 计分 & 结果
// ============================================================
function calculateType(){
  let scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0,Te:0,Ti:0,Fe:0,Fi:0,Se:0,Si:0,Ne:0,Ni:0};
  answers.forEach(answer=>{for(let[k,v]of Object.entries(answer.selectedScore)){scores[k]=(scores[k]||0)+v}});
  const type=[
    scores.E>=scores.I?'E':'I',scores.S>=scores.N?'S':'N',
    scores.T>=scores.F?'T':'F',scores.J>=scores.P?'J':'P'
  ].join('');
  const makePct=(a,b)=>{const t=a+b;return t?Math.round((a/t)*100):50};
  const percentages={
    EI:{left:'E',right:'I',leftPct:makePct(scores.E,scores.I),rightPct:makePct(scores.I,scores.E)},
    SN:{left:'S',right:'N',leftPct:makePct(scores.S,scores.N),rightPct:makePct(scores.N,scores.S)},
    TF:{left:'T',right:'F',leftPct:makePct(scores.T,scores.F),rightPct:makePct(scores.F,scores.T)},
    JP:{left:'J',right:'P',leftPct:makePct(scores.J,scores.P),rightPct:makePct(scores.P,scores.J)}
  };
  return {type,scores,percentages};
}

  const groupEl=document.getElementById('result-group');groupEl.textContent=data.groupLabel||'';groupEl.className='result-group '+(data.group||'');

  const dimLabels={EI:{left:'外向 E',right:'I 内向'},SN:{left:'实感 S',right:'N 直觉'},TF:{left:'思考 T',right:'F 情感'},JP:{left:'判断 J',right:'P 感知'}};
  const dimsContainer=document.getElementById('result-dimensions');dimsContainer.innerHTML='';
  ['EI','SN','TF','JP'].forEach(key=>{
    const dim=percentages[key],labels=dimLabels[key];
    const row=document.createElement('div');row.className='dimension-row';
    row.innerHTML=`<span class="dimension-label left">${labels.left}</span><div class="dimension-bar-wrap"><div class="dimension-bar-fill dom-bar" style="width:0" data-width="${dim.leftPct}%"></div><div class="dimension-bar-fill muted" style="width:0" data-width="${dim.rightPct}%"></div></div><span class="dimension-label right">${labels.right}</span>`;

  });
  const fs=data.funcStack;
  const funcNames={Ni:'内倾直觉',Ne:'外倾直觉',Si:'内倾感觉',Se:'外倾感觉',Ti:'内倾思维',Te:'外倾思维',Fi:'内倾情感',Fe:'外倾情感'};
  document.getElementById('result-func-stack').innerHTML=`
    <h3 style="text-align:center;font-size:13px;color:var(--text-muted);letter-spacing:.04em;margin-bottom:14px">认知功能栈（荣格-迈尔斯模型）</h3>

    <div class="func-row"><span class="func-pos">辅助</span><span class="func-name" style="color:rgba(184,148,62,.7)">${fs.aux}</span><span style="font-size:11px;color:var(--text-secondary)">${funcNames[fs.aux]||''}</span><div class="func-bar-wrap"><div class="func-bar-fill aux" style="width:75%"></div></div></div>

    <div class="func-row"><span class="func-pos">劣势</span><span class="func-name" style="color:rgba(0,0,0,.2)">${fs.inf}</span><span style="font-size:11px;color:var(--text-secondary)">${funcNames[fs.inf]||''}</span><div class="func-bar-wrap"><div class="func-bar-fill inf" style="width:25%"></div></div></div>`;

document.getElementById('btn-share').addEventListener('click',()=>{
  const {type,data}=window._lastResult||{};if(!type)return;
  const text=`我测出了${type}（${data.nickname}）！来看看你是什么类型？`,url=window.location.href;
  if(navigator.share)navigator.share({title:`我的MBTI类型：${type}`,text,url}).catch(e=>{if(e.name!=='AbortError')copyClip(text+' '+url)});
  else copyClip(text+' '+url);
});
function copyClip(text){
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(()=>toast('链接已复制！分享给朋友吧'));
  else{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('链接已复制！')}catch(e){toast('请手动复制')};document.body.removeChild(ta)}
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}

function showTypeDetail(code){
  const d=typeData[code],funcNames={Ni:'内倾直觉 Ni',Ne:'外倾直觉 Ne',Si:'内倾感觉 Si',Se:'外倾感觉 Se',Ti:'内倾思维 Ti',Te:'外倾思维 Te',Fi:'内倾情感 Fi',Fe:'外倾情感 Fe'},fs=d.funcStack;
  const groupColors={'nt':'linear-gradient(135deg,rgba(107,92,191,.1),rgba(107,92,191,.02))','nf':'linear-gradient(135deg,rgba(30,168,150,.1),rgba(30,168,150,.02))','sj':'linear-gradient(135deg,rgba(59,109,192,.1),rgba(59,109,192,.02))','sp':'linear-gradient(135deg,rgba(212,136,48,.1),rgba(212,136,48,.02))'};
  document.getElementById('detail-container').innerHTML=`
    <div class="detail-header"><div class="detail-type-badge">${d.emoji} ${code}</div><div class="detail-nickname">${d.nickname} · <span class="result-group ${d.group}" style="display:inline">${d.groupLabel}</span></div></div>
    <div class="detail-illustration" style="background:${groupColors[d.group]||groupColors['nt']}">${genIllus(d.group)}</div>
    <div class="detail-card full-width"><h3><span class="dot"></span>核心特质</h3><p>${d.description}</p></div>
    <div class="detail-card"><h3><span class="dot"></span>认知功能栈</h3><p style="margin-bottom:14px;font-size:12px;color:var(--text-muted)">荣格提出、迈尔斯发展的功能层级模型</p>
      <div class="func-row"><span class="func-pos">主导</span><span class="func-name" style="color:var(--gold)">${fs.dom}</span><span style="font-size:11px;color:var(--text-secondary)">${funcNames[fs.dom]||''}</span><div class="func-bar-wrap"><div class="func-bar-fill dom" style="width:100%"></div></div></div>
      <div class="func-row"><span class="func-pos">辅助</span><span class="func-name" style="color:rgba(184,148,62,.7)">${fs.aux}</span><span style="font-size:11px;color:var(--text-secondary)">${funcNames[fs.aux]||''}</span><div class="func-bar-wrap"><div class="func-bar-fill aux" style="width:75%"></div></div></div>
      <div class="func-row"><span class="func-pos">第三</span><span class="func-name" style="color:rgba(184,148,62,.45)">${fs.ter}</span><span style="font-size:11px;color:var(--text-secondary)">${funcNames[fs.ter]||''}</span><div class="func-bar-wrap"><div class="func-bar-fill ter" style="width:50%"></div></div></div>
      <div class="func-row"><span class="func-pos">劣势</span><span class="func-name" style="color:rgba(0,0,0,.2)">${fs.inf}</span><span style="font-size:11px;color:var(--text-secondary)">${funcNames[fs.inf]||''}</span><div class="func-bar-wrap"><div class="func-bar-fill inf" style="width:25%"></div></div></div>
      <p style="margin-top:10px;font-size:12px;color:var(--text-secondary)">${d.funcDetail}</p></div>
    <div class="detail-card"><h3><span class="dot"></span>优势</h3><ul>${d.strengths.map(s=>`<li>${s}</li>`).join('')}</ul></div>
    <div class="detail-card"><h3><span class="dot"></span>成长盲点</h3><ul>${d.blindspots.map(s=>`<li>${s}</li>`).join('')}</ul></div>
    <div class="detail-card"><h3><span class="dot"></span>职业倾向</h3><p style="font-size:12px;color:var(--text-muted);margin-bottom:8px">（基于迈尔斯《天生不同》职业匹配研究）</p><div class="detail-tags">${d.career.map(c=>`<span class="detail-tag">${c}</span>`).join('')}</div></div>
    <div class="detail-card"><h3><span class="dot"></span>人际关系与婚恋</h3><p style="font-size:12px">${d.relationships}</p></div>
    <div class="detail-card full-width"><h3><span class="dot"></span>压力下的\"劣势功能爆发\"（Grip）</h3><p style="font-size:12px">${d.grip}</p></div>`;
  showSection(sectionDetail);sectionDetail.scrollIntoView({behavior:'smooth',block:'start'});
}

  const ill={
    nt:`<svg viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg"><circle cx="150"cy="90"r="45"fill="none"stroke="rgba(107,92,191,.25)"stroke-width="1.5"/><circle cx="150"cy="90"r="25"fill="none"stroke="rgba(107,92,191,.4)"stroke-width="1.5"/><circle cx="150"cy="90"r="7"fill="rgba(107,92,191,.4)"/><line x1="180"y1="60"x2="280"y2="120"stroke="rgba(184,148,62,.25)"stroke-width="1"/><line x1="195"y1="50"x2="295"y2="110"stroke="rgba(184,148,62,.12)"stroke-width=".5"/><rect x="250"y="65"width="70"height="50"rx="6"fill="none"stroke="rgba(0,0,0,.08)"stroke-width="1"/><text x="285"y="95"text-anchor="middle"fill="rgba(0,0,0,.2)"font-size="13"font-family="serif">NT</text><circle cx="60"cy="50"r="2"fill="rgba(0,0,0,.1)"/><circle cx="320"cy="40"r="2"fill="rgba(0,0,0,.08)"/></svg>`,
    nf:`<svg viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg"><path d="M80 130 Q140 50 200 90 Q260 130 320 50"fill="none"stroke="rgba(30,168,150,.3)"stroke-width="1.5"/><path d="M100 140 Q150 70 200 100 Q250 130 300 70"fill="none"stroke="rgba(30,168,150,.15)"stroke-width="1"/><circle cx="200"cy="78"r="5"fill="rgba(184,148,62,.35)"/><circle cx="130"cy="92"r="3"fill="rgba(30,168,150,.3)"/><circle cx="270"cy="88"r="3"fill="rgba(30,168,150,.3)"/><text x="200"y="165"text-anchor="middle"fill="rgba(0,0,0,.2)"font-size="13"font-family="serif">NF</text></svg>`,
    sj:`<svg viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg"><rect x="50"y="35"width="75"height="65"rx="6"fill="none"stroke="rgba(59,109,192,.3)"stroke-width="1.5"/><rect x="160"y="35"width="75"height="65"rx="6"fill="none"stroke="rgba(59,109,192,.2)"stroke-width="1"/><rect x="270"y="35"width="75"height="65"rx="6"fill="none"stroke="rgba(59,109,192,.1)"stroke-width=".8"/><line x1="87"y1="120"x2="87"y2="150"stroke="rgba(184,148,62,.25)"stroke-width="1.5"/><line x1="197"y1="120"x2="197"y2="150"stroke="rgba(184,148,62,.18)"stroke-width="1"/><line x1="307"y1="120"x2="307"y2="150"stroke="rgba(184,148,62,.1)"stroke-width=".8"/><text x="197"y="168"text-anchor="middle"fill="rgba(0,0,0,.2)"font-size="13"font-family="serif">SJ</text></svg>`,
    sp:`<svg viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg"><circle cx="200"cy="80"r="35"fill="none"stroke="rgba(212,136,48,.25)"stroke-width="1.5"/><circle cx="140"cy="55"r="20"fill="none"stroke="rgba(212,136,48,.18)"stroke-width="1"/><circle cx="260"cy="55"r="15"fill="none"stroke="rgba(212,136,48,.12)"stroke-width="1"/><circle cx="200"cy="80"r="6"fill="rgba(212,136,48,.35)"/><path d="M200 115 Q170 140 140 140"fill="none"stroke="rgba(184,148,62,.25)"stroke-width="1.2"/><path d="M200 115 Q230 140 260 140"fill="none"stroke="rgba(184,148,62,.18)"stroke-width="1"/><text x="200"y="165"text-anchor="middle"fill="rgba(0,0,0,.2)"font-size="13"font-family="serif">SP</text></svg>`
  };
  return ill[g]||ill['nt'];
}

// ============================================================
// 键盘
// ============================================================
document.addEventListener('keydown',(e)=>{
  if(!sectionQuiz.classList.contains('active'))return;
  if(['1','2','3','4','5'].includes(e.key)){const oi=parseInt(e.key)-1;if(oi<getQuestions()[currentIndex].options.length)selectOption(currentIndex,oi)}
  if(e.key==='ArrowLeft')document.getElementById('btn-prev').click();
  if(e.key==='ArrowRight'||e.key==='Enter')document.getElementById('btn-next').click();
});

console.log('✨ MBTI v4 — 浅色渐变 · 5级量表 · 荣格八维认知功能');
</script>
