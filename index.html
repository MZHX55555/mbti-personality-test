<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="免费 MBTI 性格测试，16 种人格类型，探索你的真实自我。深度的性格分析，了解你的优势与特质。">
  <meta property="og:title" content="MBTI 性格测试 — 发现你的真实人格">
  <meta property="og:description" content="只需几分钟，揭示你的性格密码。16 种人格类型，你属于哪一种？">
  <meta property="og:type" content="website">
  <title>MBTI 性格测试 — 发现你的真实人格</title>

  <!-- Google Fonts (带中文回退) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ========================================
       CSS 变量 — 设计系统的控制中心
       ======================================== */
    :root {
      --bg-canvas: #0A0A0A;
      --bg-surface: #141414;
      --bg-elevated: #1A1A1A;
      --gold: #C4A662;
      --gold-hover: #D4B873;
      --gold-glow: rgba(196, 166, 98, 0.10);
      --gold-border: rgba(196, 166, 98, 0.30);
      --text-primary: #F0F0F0;
      --text-secondary: #999999;
      --text-muted: #555555;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-card: rgba(255, 255, 255, 0.08);
      --danger: #C46262;
      --font-serif: 'Playfair Display', 'Noto Serif SC', 'STSong', 'Songti SC', serif;
      --font-sans: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
      --transition-fast: 0.2s ease;
      --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ========================================
       重置 & 基础样式
       ======================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg-canvas);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ========================================
       排版
       ======================================== */
    .serif {
      font-family: var(--font-serif);
      font-weight: 400;
    }

    h1, h2, h3, .headline {
      font-family: var(--font-serif);
      font-weight: 400;
      line-height: 1.15;
    }

    .text-gold { color: var(--gold); }
    .text-secondary { color: var(--text-secondary); }
    .text-muted { color: var(--text-muted); }

    /* ========================================
       布局
       ======================================== */
    .section {
      display: none;
      min-height: 100vh;
      padding: 60px 24px;
    }

    .section.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
    }

    .text-center { text-align: center; }

    /* ========================================
       按钮
       ======================================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 36px;
      border: none;
      border-radius: 2px;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-decoration: none;
      outline: none;
      position: relative;
      overflow: hidden;
    }

    .btn-gold {
      background: var(--gold);
      color: #0A0A0A;
    }

    .btn-gold:hover {
      background: var(--gold-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(196, 166, 98, 0.20);
    }

    .btn-gold:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(196, 166, 98, 0.15);
    }

    /* 金色光扫效果 */
    .btn-gold::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.15) 50%,
        transparent 100%);
      transition: left 0.6s ease;
    }

    .btn-gold:hover::after {
      left: 100%;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-card);
    }

    .btn-ghost:hover {
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }

    .btn-large {
      padding: 18px 48px;
      font-size: 17px;
      letter-spacing: 0.08em;
    }

    /* ========================================
       Hero 首页
       ======================================== */
    #section-hero {
      display: flex;
    }

    .hero-content {
      text-align: center;
      position: relative;
    }

    /* 金色光晕背景 */
    .hero-content::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    .hero-badge {
      display: inline-block;
      padding: 6px 20px;
      border: 1px solid var(--gold-border);
      border-radius: 100px;
      font-size: 13px;
      letter-spacing: 0.12em;
      color: var(--gold);
      margin-bottom: 32px;
      font-family: var(--font-sans);
      font-weight: 400;
    }

    .hero-headline {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    .hero-headline .accent {
      display: block;
      color: var(--gold);
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--text-secondary);
      max-width: 480px;
      margin: 0 auto 48px;
      line-height: 1.8;
    }

    .hero-scroll-hint {
      position: absolute;
      bottom: -120px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .hero-scroll-hint span {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }

    .hero-scroll-hint small {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.3); }
    }

    /* ========================================
       答题页 Quiz
       ======================================== */
    .quiz-progress-wrap {
      width: 100%;
      margin-bottom: 48px;
    }

    .quiz-progress-bar {
      width: 100%;
      height: 1px;
      background: var(--border-subtle);
      border-radius: 1px;
      overflow: hidden;
    }

    .quiz-progress-fill {
      height: 100%;
      background: var(--gold);
      width: 0%;
      transition: width var(--transition-smooth);
      border-radius: 1px;
    }

    .quiz-progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .quiz-question-area {
      width: 100%;
      margin-bottom: 48px;
      min-height: 60px;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .quiz-question-area.fading {
      opacity: 0;
      transform: translateY(10px);
    }

    .quiz-question-text {
      font-family: var(--font-serif);
      font-size: clamp(1.3rem, 3.5vw, 1.7rem);
      font-weight: 400;
      line-height: 1.5;
      text-align: center;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      margin-bottom: 40px;
    }

    .quiz-option {
      display: flex;
      align-items: center;
      padding: 20px 24px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      cursor: pointer;
      transition: all var(--transition-fast);
      font-size: 15px;
      color: var(--text-secondary);
      position: relative;
      text-align: left;
      line-height: 1.6;
    }

    .quiz-option:hover {
      border-color: var(--gold-border);
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .quiz-option.selected {
      border-color: var(--gold);
      color: var(--text-primary);
      background: var(--bg-elevated);
      box-shadow: 0 0 0 1px var(--gold), 0 4px 24px var(--gold-glow);
    }

    .quiz-option-radio {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid var(--border-card);
      margin-right: 16px;
      flex-shrink: 0;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quiz-option.selected .quiz-option-radio {
      border-color: var(--gold);
      background: var(--gold);
    }

    .quiz-option.selected .quiz-option-radio::after {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #0A0A0A;
    }

    .quiz-nav {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    /* ========================================
       结果页 Results
       ======================================== */
    .result-type-badge {
      font-family: var(--font-serif);
      font-size: clamp(3.5rem, 10vw, 7rem);
      letter-spacing: 0.12em;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1;
    }

    .result-nickname {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      color: var(--gold);
      margin-bottom: 32px;
      letter-spacing: 0.04em;
    }

    .result-description {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.9;
      margin-bottom: 48px;
      max-width: 540px;
    }

    /* 维度条形图 */
    .result-dimensions {
      width: 100%;
      margin-bottom: 48px;
    }

    .dimension-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .dimension-label {
      font-size: 13px;
      letter-spacing: 0.06em;
      width: 36px;
      flex-shrink: 0;
    }

    .dimension-label.left {
      text-align: right;
      color: var(--gold);
    }

    .dimension-label.right {
      text-align: left;
      color: var(--text-secondary);
    }

    .dimension-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--bg-elevated);
      border-radius: 2px;
      overflow: hidden;
      display: flex;
    }

    .dimension-bar-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .dimension-bar-fill.muted {
      background: rgba(255, 255, 255, 0.10);
    }

    .dimension-pct {
      font-size: 11px;
      color: var(--text-muted);
      width: 36px;
      flex-shrink: 0;
      text-align: center;
    }

    /* 解锁预告卡片 */
    .result-locked-card {
      width: 100%;
      padding: 32px 24px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      text-align: center;
      margin-bottom: 32px;
      position: relative;
    }

    .result-locked-card .lock-icon {
      font-size: 28px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .result-locked-card h3 {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    .result-locked-card p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .result-locked-card .badge-coming {
      display: inline-block;
      padding: 3px 12px;
      border: 1px solid var(--gold-border);
      border-radius: 100px;
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-top: 12px;
    }

    .result-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ========================================
       Toast 提示
       ======================================== */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-elevated);
      color: var(--text-primary);
      padding: 12px 28px;
      border-radius: 100px;
      font-size: 14px;
      border: 1px solid var(--border-card);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1000;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ========================================
       Footer
       ======================================== */
    .site-footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border-subtle);
    }

    .site-footer p {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* ========================================
       动画
       ======================================== */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.35s; opacity: 0; }
    .delay-4 { animation-delay: 0.5s; opacity: 0; }

    /* ========================================
       响应式 — 平板/桌面
       ======================================== */
    @media (min-width: 768px) {
      .section {
        padding: 80px 40px;
      }

      .quiz-options {
        flex-direction: row;
        gap: 16px;
      }

      .quiz-option {
        flex: 1;
        min-height: 120px;
        align-items: flex-start;
        padding: 28px;
        font-size: 16px;
      }

      .quiz-option-radio {
        margin-top: 2px;
      }

      .quiz-question-text {
        font-size: 1.6rem;
      }
    }

    @media (min-width: 1024px) {
      .container {
        max-width: 700px;
      }
    }

    /* ========================================
       小屏手机优化
       ======================================== */
    @media (max-width: 360px) {
      .hero-headline {
        font-size: 2.2rem;
      }

      .quiz-option {
        padding: 16px 18px;
        font-size: 14px;
      }

      .btn-large {
        padding: 14px 32px;
        font-size: 15px;
      }

      .result-type-badge {
        font-size: 2.8rem;
      }
    }
  </style>
</head>
<body>

  <!-- ========================================
       Hero 首页
       ======================================== -->
  <section id="section-hero" class="section active">
    <div class="container">
      <div class="hero-content">

  <!-- ========================================

  <section id="section-quiz" class="section">
    <div class="container">
      <!-- 进度条 -->
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-bar">
          <div class="quiz-progress-fill" id="progress-fill"></div>
        </div>
        <div class="quiz-progress-text">
          <span id="progress-label">第 1 / 24 题</span>
          <span id="progress-pct">0%</span>
        </div>
      </div>

      <!-- 题目区 -->
      <div class="quiz-question-area" id="question-area">
        <p class="quiz-question-text" id="question-text"></p>

      <div class="quiz-options" id="options-container"></div>

      <!-- 导航 -->
      <div class="quiz-nav">

        <button class="btn btn-gold" id="btn-next">下一题</button>

  </section>

  <!-- ========================================
       结果页
       ======================================== -->
  <section id="section-results" class="section">
    <div class="container text-center">
      <div class="result-type-badge animate-in delay-1" id="result-type"></div>
      <div class="result-nickname animate-in delay-2" id="result-nickname"></div>
      <p class="result-description animate-in delay-3" id="result-description"></p>

      <!-- 维度分析 -->
      <div class="result-dimensions animate-in delay-4" id="result-dimensions"></div>

      <!-- 分享按钮 -->
      <div class="result-actions animate-in delay-4">
        <button class="btn btn-gold" id="btn-share">分享结果</button>
        <button class="btn btn-ghost" id="btn-retake">重新测试</button>
      </div>

      <!-- 解锁完整报告 -->
      <div class="result-locked-card animate-in delay-4" style="margin-top: 48px;">
        <div class="lock-icon">🔒</div>
        <h3>解锁你的完整性格报告</h3>
        <p>深入了解你的性格优势、职业方向、恋爱匹配与成长建议<br>—— 一份专属于你的深度分析报告。</p>
        <div class="badge-coming">即将上线</div>
      </div>
    </div>
  </section>

  <!-- ========================================
       Toast
       ======================================== -->
  <div class="toast" id="toast"></div>

  <!-- ========================================
       Footer
       ======================================== -->
  <footer class="site-footer">
    <p>本测试仅供娱乐参考，非官方 MBTI 临床评估工具。</p>
  </footer>

  <!-- ========================================
       JavaScript — 题库 + 引擎 + 结果
       ======================================== -->

        },
        {
          id: 4,
          text: "在小组讨论中，你通常……",
          dimension: "EI",
          options: [
            { text: "脱口而出自己的想法，边说边理清思路", score: { E: 1 } },
            { text: "先在脑中反复琢磨，想清楚了再开口", score: { I: 1 } }
          ]
        },
        {
          id: 5,
          text: "认识新朋友对你来说……",
          dimension: "EI",
          options: [
            { text: "是件让人兴奋的事，你乐在其中", score: { E: 1 } },
            { text: "需要消耗不少精力，你比较慢热", score: { I: 1 } }
          ]
        },
        {
          id: 6,

            { text: "立刻接起来，直接沟通最有效率", score: { E: 1 } },
            { text: "犹豫一下，想想对方要说什么再接", score: { I: 1 } }
          ]
        },

        // ===== SN 维度 (实感 vs 直觉) 6 题 =====
        {
          id: 7,
          text: "阅读一本书时，你更关注……",
          dimension: "SN",
          options: [
            { text: "具体的细节、事实和作者描述的精确画面", score: { S: 1 } },
            { text: "文字背后的隐喻、主题和整体氛围", score: { N: 1 } }
          ]
        },

    // ==========================================
    // 切换页面

    function showSection(section) {

      section.classList.add('active');
    }

    // ==========================================
    // 渲染题目
    // ==========================================
    function renderQuestion(index) {
      const q = quizData.questions[index];
      const questionArea = document.getElementById('question-area');
      const optionsContainer = document.getElementById('options-container');
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');

      // 淡出
      questionArea.classList.add('fading');

      setTimeout(() => {
        // 更新题目文字
        document.getElementById('question-text').textContent = q.text;

        // 渲染选项
        optionsContainer.innerHTML = '';
        q.options.forEach((opt, optIndex) => {
          const btn = document.createElement('div');
          btn.className = 'quiz-option';
          btn.innerHTML = `
            <div class="quiz-option-radio"></div>
            <span>${opt.text}</span>
          `;

          // 检查是否已答过此题
          const existingAnswer = answers.find(a => a.questionId === q.id);
          if (existingAnswer && optIndex === q.options.findIndex(
            o => JSON.stringify(o.score) === JSON.stringify(existingAnswer.selectedScore)
          )) {
            btn.classList.add('selected');
          }

          btn.addEventListener('click', () => selectOption(index, optIndex));
          optionsContainer.appendChild(btn);
        });

        // 淡入
        questionArea.classList.remove('fading');

        // 更新进度条
        updateProgress(index);

        // 按钮状态
        btnPrev.style.visibility = index === 0 ? 'hidden' : 'visible';

        if (index === quizData.questions.length - 1) {
          btnNext.textContent = '查看结果';
        } else {
          btnNext.textContent = '下一题';
        }

        // 滚动到题目区域
        sectionQuiz.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 200);
    }

    // ==========================================
    // 选择选项
    // ==========================================
    function selectOption(questionIndex, optionIndex) {
      const q = quizData.questions[questionIndex];

      // 存储答案
      const existingIndex = answers.findIndex(a => a.questionId === q.id);
      const answer = {
        questionId: q.id,
        selectedScore: q.options[optionIndex].score
      };

      if (existingIndex >= 0) {
        answers[existingIndex] = answer;
      } else {
        answers.push(answer);
      }

      // 更新选中状态
      const options = document.querySelectorAll('.quiz-option');
      options.forEach((opt, i) => {
        opt.classList.toggle('selected', i === optionIndex);
      });

      // 自动前进到下一题（短暂延迟让用户看到选中效果）
      if (questionIndex < quizData.questions.length - 1) {
        setTimeout(() => {
          currentIndex = questionIndex + 1;
          renderQuestion(currentIndex);
        }, 350);
      }
    }

    // ==========================================
    // 更新进度条
    // ==========================================
    function updateProgress(index) {
      const total = quizData.questions.length;
      const pct = Math.round((index / total) * 100);

      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent = `第 ${index + 1} / ${total} 题`;
      document.getElementById('progress-pct').textContent = pct + '%';
    }

    // ==========================================
    // 导航按钮事件
    // ==========================================
    document.getElementById('btn-next').addEventListener('click', () => {
      const currentAnswer = answers.find(a => a.questionId === quizData.questions[currentIndex].id);

      if (!currentAnswer) {
        // 还没选，提示一下
        shakeElement(document.getElementById('options-container'));
        return;
      }

      if (currentIndex === quizData.questions.length - 1) {
        // 最后一道 → 计算并显示结果
        showResults();
      } else {
        currentIndex++;
        renderQuestion(currentIndex);
      }
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion(currentIndex);
      }
    });

    // 轻微抖动提示
    function shakeElement(el) {
      el.style.transition = 'transform 0.1s ease';
      el.style.transform = 'translateX(-4px)';
      setTimeout(() => { el.style.transform = 'translateX(4px)'; }, 100);
      setTimeout(() => { el.style.transform = 'translateX(-3px)'; }, 200);
      setTimeout(() => { el.style.transform = 'translateX(0)'; }, 300);
    }

    // ==========================================
    // 计分 & 显示结果
    // ==========================================
    function calculateType() {
      let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

      answers.forEach(answer => {
        for (let [key, val] of Object.entries(answer.selectedScore)) {
          scores[key] += val;
        }
      });

      // 判定每个维度
      const type = [
        scores.E >= scores.I ? 'E' : 'I',
        scores.S >= scores.N ? 'S' : 'N',
        scores.T >= scores.F ? 'T' : 'F',
        scores.J >= scores.P ? 'J' : 'P',
      ].join('');

      // 计算每个维度的百分比
      const percentages = {
        EI: {
          left: 'E',
          right: 'I',
          leftPct: Math.round((scores.E / (scores.E + scores.I)) * 100) || 50,
          rightPct: Math.round((scores.I / (scores.E + scores.I)) * 100) || 50,
        },
        SN: {
          left: 'S',
          right: 'N',
          leftPct: Math.round((scores.S / (scores.S + scores.N)) * 100) || 50,
          rightPct: Math.round((scores.N / (scores.S + scores.N)) * 100) || 50,
        },
        TF: {
          left: 'T',
          right: 'F',
          leftPct: Math.round((scores.T / (scores.T + scores.F)) * 100) || 50,
          rightPct: Math.round((scores.F / (scores.T + scores.F)) * 100) || 50,
        },
        JP: {
          left: 'J',
          right: 'P',
          leftPct: Math.round((scores.J / (scores.J + scores.P)) * 100) || 50,
          rightPct: Math.round((scores.P / (scores.J + scores.P)) * 100) || 50,
        },
      };

      return { type, scores, percentages };
    }

      ['EI', 'SN', 'TF', 'JP'].forEach(key => {

        const labels = dimLabels[key];
        const row = document.createElement('div');
        row.className = 'dimension-row';
        row.innerHTML = `

            <div class="dimension-bar-fill" style="width: 0%;" data-width="${dim.leftPct}%"></div>
            <div class="dimension-bar-fill muted" style="width: 0%;" data-width="${dim.rightPct}%"></div>
          </div>
          <span class="dimension-label right">${labels.right}</span>
        `;
        dimsContainer.appendChild(row);
      });

      // 切换到结果页
      showSection(sectionResults);
      sectionResults.scrollIntoView({ behavior: 'smooth', block: 'start' });

      // 延迟触发条形图动画
      setTimeout(() => {
        document.querySelectorAll('.dimension-bar-fill').forEach(bar => {
          bar.style.width = bar.getAttribute('data-width');
        });
      }, 300);

      // 存储结果用于分享
      window._lastResult = { type, desc };
    }

    // ==========================================
    // 分享功能
    // ==========================================
    document.getElementById('btn-share').addEventListener('click', () => {
      const { type, desc } = window._lastResult || {};
      if (!type) return;

      const shareText = `我在 MBTI 性格测试中测出了 ${type}（${desc.nickname}）！来看看你是什么类型？`;
      const shareUrl = window.location.href;

      // 优先用 Web Share API（手机端）
      if (navigator.share) {
        navigator.share({
          title: `我的 MBTI 类型：${type}`,
          text: shareText,
          url: shareUrl,
        }).catch(err => {
          if (err.name !== 'AbortError') {
            copyToClipboard(shareText + ' ' + shareUrl);
          }
        });
      } else {
        // 桌面端：复制链接
        copyToClipboard(shareText + ' ' + shareUrl);
      }
    });

    function copyToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => showToast('链接已复制！分享给你的朋友吧'));
      } else {
        // 旧浏览器降级
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); showToast('链接已复制！分享给你的朋友吧'); }
        catch (e) { showToast('请手动复制链接分享给朋友'); }
        document.body.removeChild(ta);
      }
    }

    // ==========================================
    // Toast 提示
    // ==========================================
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 2200);
    }

    // ==========================================
    // 重新测试
    // ==========================================
    document.getElementById('btn-retake').addEventListener('click', () => {
      currentIndex = 0;
      answers = [];
      window._lastResult = null;
      renderQuestion(0);
      showSection(sectionQuiz);
      sectionQuiz.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // ==========================================
    // 开始测试按钮
    // ==========================================
    document.getElementById('btn-start').addEventListener('click', () => {
      currentIndex = 0;
      answers = [];
      renderQuestion(0);
      showSection(sectionQuiz);
      sectionQuiz.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // ==========================================
    // 键盘操作支持
    // ==========================================
    document.addEventListener('keydown', (e) => {
      if (!sectionQuiz.classList.contains('active')) return;

      if (e.key === '1' || e.key === '2') {
        const optIndex = parseInt(e.key) - 1;
        if (optIndex < quizData.questions[currentIndex].options.length) {
          selectOption(currentIndex, optIndex);
        }
      }
      if (e.key === 'ArrowLeft') {
        document.getElementById('btn-prev').click();
      }
      if (e.key === 'ArrowRight' || e.key === 'Enter') {
        document.getElementById('btn-next').click();
      }
    });

    console.log('✨ MBTI 性格测试已就绪 — 深色奢华版');
    console.log('   配色: 深黑 #0A0A0A + 香槟金 #C4A662');
    console.log('   题目: 24 道 · 16 种人格 · 4 个维度');
    console.log('   按下"开始测试"或直接打开页面即可体验');
  </script>
</body>
</html>
