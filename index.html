<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="免费 MBTI 性格测试，16 种人格类型，探索你的真实自我。深度的性格分析，了解你的优势与特质。">
  <meta property="og:title" content="MBTI 性格测试 — 发现你的真实人格">
  <meta property="og:description" content="只需几分钟，揭示你的性格密码。16 种人格类型，你属于哪一种？">
  <meta property="og:type" content="website">
  <title>MBTI 性格测试 — 发现你的真实人格</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ========================================
       CSS 变量 — 活力深色系设计
       ======================================== */
    :root {
      --bg-deep: #0d0d1a;
      --bg-surface: rgba(255,255,255,0.03);
      --bg-elevated: rgba(255,255,255,0.06);
      --gold: #D4A843;
      --gold-hover: #E5BC5A;
      --gold-glow: rgba(212, 168, 67, 0.12);
      --gold-border: rgba(212, 168, 67, 0.35);
      --text-primary: #EDEDED;
      --text-secondary: #A0A0A0;
      --text-muted: #666666;
      --border-subtle: rgba(255,255,255,0.05);
      --border-card: rgba(255,255,255,0.10);
      --font-serif: 'Playfair Display', 'Noto Serif SC', 'STSong', 'Songti SC', serif;
      --font-sans: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
      --transition-fast: 0.2s ease;
      --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      --container-max: 700px;
    }

    /* ========================================
       重置 & 基础
       ======================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      /* 活力渐变背景：紫罗兰 → 靛蓝 → 深海蓝，层次丰富不压抑 */
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(100, 60, 180, 0.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 70% at 80% 90%, rgba(40, 100, 160, 0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(200, 140, 60, 0.04) 0%, transparent 70%),
        linear-gradient(165deg, #0d0d1a 0%, #151228 25%, #0f1828 50%, #0e1622 75%, #0d0d1a 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* 微妙的动态光点装饰 */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(2px 2px at 15% 25%, rgba(255,255,255,0.12), transparent),
        radial-gradient(2px 2px at 75% 15%, rgba(255,255,255,0.08), transparent),
        radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.10), transparent),
        radial-gradient(2px 2px at 30% 80%, rgba(255,255,255,0.06), transparent),
        radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.09), transparent),
        radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.07), transparent),
        radial-gradient(1px 1px at 45% 40%, rgba(255,255,255,0.08), transparent);
      pointer-events: none;
      z-index: 0;
      animation: twinkle 8s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    /* 确保内容在光点之上 */
    body > * { position: relative; z-index: 1; }

    /* ========================================
       排版
       ======================================== */
    .serif { font-family: var(--font-serif); font-weight: 400; }
    h1, h2, h3, .headline { font-family: var(--font-serif); font-weight: 400; line-height: 1.15; }
    .text-gold { color: var(--gold); }
    .text-secondary { color: var(--text-secondary); }
    .text-muted { color: var(--text-muted); }

    /* ========================================
       布局
       ======================================== */
    .section {
      display: none;
      min-height: 100vh;
      padding: 60px 24px;
    }

    .section.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 16型介绍页需要滚动，不能居中挤压 */
    #section-types.active {
      justify-content: flex-start;
      padding-top: 40px;
      padding-bottom: 80px;
    }

    .container {
      width: 100%;
      max-width: var(--container-max);
      margin: 0 auto;
    }

    /* 介绍页容器更宽以容纳卡片网格 */
    #section-types .container {
      max-width: 960px;
    }

    .text-center { text-align: center; }

    /* ========================================
       按钮
       ======================================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 36px;
      border: none;
      border-radius: 2px;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-decoration: none;
      outline: none;
      position: relative;
      overflow: hidden;
    }

    .btn-gold {
      background: var(--gold);
      color: #12121A;
    }

    .btn-gold:hover {
      background: var(--gold-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(212, 168, 67, 0.25);
    }

    .btn-gold:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(212, 168, 67, 0.18);
    }

    .btn-gold::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
      transition: left 0.6s ease;
    }

    .btn-gold:hover::after { left: 100%; }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-card);
    }

    .btn-ghost:hover {
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.30);
    }

    .btn-outline-gold {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold-border);
    }

    .btn-outline-gold:hover {
      background: rgba(212,168,67,0.08);
      border-color: var(--gold);
    }

    .btn-large { padding: 18px 48px; font-size: 17px; letter-spacing: 0.08em; }

    .btn-back {
      background: transparent;
      color: var(--text-secondary);
      border: none;
      padding: 10px 0;
      font-size: 14px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: color var(--transition-fast);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-back:hover { color: var(--text-primary); }
    .btn-back::before { content: '←'; font-size: 16px; }

    /* ========================================
       首页 Hero
       ======================================== */
    #section-hero { display: flex; }

    .hero-content {
      text-align: center;
      position: relative;
    }

    .hero-content::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    .hero-badge {
      display: inline-block;
      padding: 6px 20px;
      border: 1px solid var(--gold-border);
      border-radius: 100px;
      font-size: 13px;
      letter-spacing: 0.12em;
      color: var(--gold);
      margin-bottom: 32px;
      font-weight: 400;
    }

    .hero-headline {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    .hero-headline .accent {
      display: block;
      color: var(--gold);
    }

    .hero-tagline {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--text-secondary);
      max-width: 480px;
      margin: 0 auto 48px;
      line-height: 1.8;
    }

    .hero-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ========================================
       答题页 Quiz
       ======================================== */
    .quiz-progress-wrap { width: 100%; margin-bottom: 48px; }

    .quiz-progress-bar {
      width: 100%; height: 1px;
      background: rgba(255,255,255,0.08);
      border-radius: 1px;
      overflow: hidden;
    }

    .quiz-progress-fill {
      height: 100%;
      background: var(--gold);
      width: 0%;
      transition: width var(--transition-smooth);
      border-radius: 1px;
    }

    .quiz-progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .quiz-question-area {
      width: 100%;
      margin-bottom: 48px;
      min-height: 60px;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .quiz-question-area.fading { opacity: 0; transform: translateY(10px); }

    .quiz-question-text {
      font-family: var(--font-serif);
      font-size: clamp(1.3rem, 3.5vw, 1.7rem);
      font-weight: 400;
      line-height: 1.5;
      text-align: center;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      margin-bottom: 40px;
    }

    .quiz-option {
      display: flex;
      align-items: center;
      padding: 20px 24px;
      background: var(--bg-surface);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      cursor: pointer;
      transition: all var(--transition-fast);
      font-size: 15px;
      color: var(--text-secondary);
      text-align: left;
      line-height: 1.6;
    }

    .quiz-option:hover {
      border-color: var(--gold-border);
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .quiz-option.selected {
      border-color: var(--gold);
      color: var(--text-primary);
      background: rgba(212,168,67,0.06);
      box-shadow: 0 0 0 1px var(--gold), 0 4px 24px var(--gold-glow);
    }

    .quiz-option-radio {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1px solid var(--border-card);
      margin-right: 16px;
      flex-shrink: 0;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quiz-option.selected .quiz-option-radio {
      border-color: var(--gold);
      background: var(--gold);
    }

    .quiz-option.selected .quiz-option-radio::after {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #12121A;
    }

    .quiz-nav {
      display: flex; gap: 16px; align-items: center;
    }

    /* ========================================
       结果页 Results
       ======================================== */
    .result-type-badge {
      font-family: var(--font-serif);
      font-size: clamp(3.5rem, 10vw, 7rem);
      letter-spacing: 0.12em;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1;
    }

    .result-nickname {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      color: var(--gold);
      margin-bottom: 32px;
      letter-spacing: 0.04em;
    }

    .result-description {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.9;
      margin-bottom: 48px;
      max-width: 540px;
    }

    /* 维度条形图 */
    .result-dimensions { width: 100%; margin-bottom: 48px; }

    .dimension-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }

    .dimension-label {
      font-size: 13px; letter-spacing: 0.06em; width: 44px; flex-shrink: 0;
    }

    .dimension-label.left { text-align: right; color: var(--gold); }
    .dimension-label.right { text-align: left; color: var(--text-secondary); }

    .dimension-bar-wrap {
      flex: 1; height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
      display: flex;
    }

    .dimension-bar-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .dimension-bar-fill.muted { background: rgba(255,255,255,0.12); }

    .result-actions {
      display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    }

    /* 解锁预告卡片 */
    .result-locked-card {
      width: 100%; padding: 32px 24px;
      background: var(--bg-surface);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      text-align: center;
      position: relative;
    }

    .result-locked-card .lock-icon { font-size: 28px; margin-bottom: 12px; opacity: 0.5; }

    .result-locked-card h3 {
      font-size: 16px; color: var(--text-secondary);
      margin-bottom: 8px; letter-spacing: 0.04em;
    }

    .result-locked-card p { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

    .badge-coming {
      display: inline-block;
      padding: 3px 12px;
      border: 1px solid var(--gold-border);
      border-radius: 100px;
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-top: 12px;
    }

    /* ========================================
       16型人格介绍页 — 卡片网格
       ======================================== */
    .types-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .types-header .section-label {
      display: inline-block;
      padding: 5px 16px;
      border: 1px solid var(--gold-border);
      border-radius: 100px;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .types-header h2 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 12px;
    }

    .types-header p {
      color: var(--text-secondary);
      font-size: 15px;
      max-width: 500px;
      margin: 0 auto;
    }

    .types-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 600px) {
      .types-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 900px) {
      .types-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (min-width: 1100px) {
      .types-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .type-card {
      background: var(--bg-surface);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 24px 20px;
      cursor: default;
      transition: all 0.3s ease;
      position: relative;
    }

    .type-card:hover {
      border-color: var(--gold-border);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 1px var(--gold-border);
      background: var(--bg-elevated);
    }

    .type-card-emoji {
      font-size: 32px;
      margin-bottom: 12px;
      display: block;
    }

    .type-card-code {
      font-family: var(--font-serif);
      font-size: 22px;
      letter-spacing: 0.1em;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .type-card-nickname {
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .type-card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 返回按钮行 */
    .types-back-row {
      margin-bottom: 32px;
      width: 100%;
      max-width: 960px;
    }

    /* ========================================
       Toast
       ======================================== */
    .toast {
      position: fixed;
      bottom: 40px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-elevated);
      backdrop-filter: blur(12px);
      color: var(--text-primary);
      padding: 12px 28px;
      border-radius: 100px;
      font-size: 14px;
      border: 1px solid var(--border-card);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1000;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ========================================
       Footer
       ======================================== */
    .site-footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border-subtle);
    }

    .site-footer p {
      font-size: 12px; color: var(--text-muted); letter-spacing: 0.04em;
    }

    /* ========================================
       动画
       ======================================== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .delay-1 { animation-delay: 0.05s; opacity: 0; }
    .delay-2 { animation-delay: 0.15s; opacity: 0; }
    .delay-3 { animation-delay: 0.30s; opacity: 0; }
    .delay-4 { animation-delay: 0.45s; opacity: 0; }

    /* 交错入场 */
    .type-card { opacity: 0; animation: fadeInUp 0.5s ease forwards; }
    .type-card:nth-child(1) { animation-delay: 0.02s; }
    .type-card:nth-child(2) { animation-delay: 0.06s; }
    .type-card:nth-child(3) { animation-delay: 0.10s; }
    .type-card:nth-child(4) { animation-delay: 0.14s; }
    .type-card:nth-child(5) { animation-delay: 0.18s; }
    .type-card:nth-child(6) { animation-delay: 0.22s; }
    .type-card:nth-child(7) { animation-delay: 0.26s; }
    .type-card:nth-child(8) { animation-delay: 0.30s; }
    .type-card:nth-child(9) { animation-delay: 0.34s; }
    .type-card:nth-child(10) { animation-delay: 0.38s; }
    .type-card:nth-child(11) { animation-delay: 0.42s; }
    .type-card:nth-child(12) { animation-delay: 0.46s; }
    .type-card:nth-child(13) { animation-delay: 0.50s; }
    .type-card:nth-child(14) { animation-delay: 0.54s; }
    .type-card:nth-child(15) { animation-delay: 0.58s; }
    .type-card:nth-child(16) { animation-delay: 0.62s; }

    /* ========================================
       响应式
       ======================================== */
    @media (min-width: 768px) {
      .section { padding: 80px 40px; }
      #section-types.active { padding-top: 60px; padding-bottom: 100px; }

      .quiz-options {
        flex-direction: row;
        gap: 16px;
      }

      .quiz-option {
        flex: 1; min-height: 120px;
        align-items: flex-start; padding: 28px; font-size: 16px;
      }

      .quiz-option-radio { margin-top: 2px; }
      .quiz-question-text { font-size: 1.6rem; }
    }

    @media (min-width: 1024px) {
      .container { max-width: 700px; }
    }

    @media (max-width: 360px) {
      .hero-headline { font-size: 2.2rem; }
      .quiz-option { padding: 16px 18px; font-size: 14px; }
      .btn-large { padding: 14px 32px; font-size: 15px; }
      .result-type-badge { font-size: 2.8rem; }
    }
  </style>
</head>
<body>

  <!-- ========================================
       Hero 首页
       ======================================== -->
  <section id="section-hero" class="section active">
    <div class="container">
      <div class="hero-content">
        <div class="hero-badge animate-in delay-1">MBTI 性格测试</div>
        <h1 class="hero-headline animate-in delay-2">
          探索你的<span class="accent">真实人格</span>
        </h1>
        <p class="hero-tagline animate-in delay-3">
          基于荣格心理学理论，通过 24 道选择题，<br>揭示你的性格类型与内在特质。
        </p>
        <div class="hero-actions animate-in delay-4">
          <button class="btn btn-gold btn-large" id="btn-start">开始测试</button>
          <button class="btn btn-outline-gold btn-large" id="btn-view-types">了解 16 种人格</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ========================================
       答题页
       ======================================== -->
  <section id="section-quiz" class="section">
    <div class="container">
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-bar">
          <div class="quiz-progress-fill" id="progress-fill"></div>
        </div>
        <div class="quiz-progress-text">
          <span id="progress-label">第 1 / 24 题</span>
          <span id="progress-pct">0%</span>
        </div>
      </div>

      <div class="quiz-question-area" id="question-area">
        <p class="quiz-question-text" id="question-text"></p>
      </div>

      <div class="quiz-options" id="options-container"></div>

      <div class="quiz-nav">
        <button class="btn btn-ghost" id="btn-prev" style="visibility: hidden;">上一题</button>
        <button class="btn btn-gold" id="btn-next">下一题</button>
      </div>
    </div>
  </section>

  <!-- ========================================
       结果页
       ======================================== -->

          btn.innerHTML = `<div class="quiz-option-radio"></div><span>${opt.text}</span>`;

          const existingAnswer = answers.find(a => a.questionId === q.id);
          if (existingAnswer && optIndex === q.options.findIndex(
            o => JSON.stringify(o.score) === JSON.stringify(existingAnswer.selectedScore)
          )) {
            btn.classList.add('selected');
          }

          btn.addEventListener('click', () => selectOption(index, optIndex));
          optionsContainer.appendChild(btn);
        });

        questionArea.classList.remove('fading');
        updateProgress(index);

        btnPrev.style.visibility = index === 0 ? 'hidden' : 'visible';
        btnNext.textContent = index === quizData.questions.length - 1 ? '查看结果' : '下一题';

        sectionQuiz.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 200);
    }

    // ==========================================
    // 选择选项
    // ==========================================
    function selectOption(questionIndex, optionIndex) {
      const q = quizData.questions[questionIndex];
      const existingIndex = answers.findIndex(a => a.questionId === q.id);
      const answer = { questionId: q.id, selectedScore: q.options[optionIndex].score };

      if (existingIndex >= 0) {
        answers[existingIndex] = answer;
      } else {
        answers.push(answer);
      }

      const options = document.querySelectorAll('.quiz-option');
      options.forEach((opt, i) => opt.classList.toggle('selected', i === optionIndex));

      if (questionIndex < quizData.questions.length - 1) {
        setTimeout(() => {
          currentIndex = questionIndex + 1;
          renderQuestion(currentIndex);
        }, 350);
      }
    }

    // ==========================================
    // 进度条
    // ==========================================
    function updateProgress(index) {
      const total = quizData.questions.length;
      const pct = Math.round((index / total) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent = `第 ${index + 1} / ${total} 题`;
      document.getElementById('progress-pct').textContent = pct + '%';
    }

    // ==========================================
    // 导航事件
    // ==========================================
    document.getElementById('btn-next').addEventListener('click', () => {
      const currentAnswer = answers.find(a => a.questionId === quizData.questions[currentIndex].id);
      if (!currentAnswer) {
        shakeElement(document.getElementById('options-container'));
        return;
      }
      if (currentIndex === quizData.questions.length - 1) {
        showResults();
      } else {
        currentIndex++;
        renderQuestion(currentIndex);
      }
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentIndex > 0) { currentIndex--; renderQuestion(currentIndex); }
    });

    function shakeElement(el) {
      el.style.transition = 'transform 0.1s ease';
      el.style.transform = 'translateX(-4px)';
      setTimeout(() => { el.style.transform = 'translateX(4px)'; }, 100);
      setTimeout(() => { el.style.transform = 'translateX(-3px)'; }, 200);
      setTimeout(() => { el.style.transform = 'translateX(0)'; }, 300);
    }

    // ==========================================
    // 计分 & 显示结果
    // ==========================================
    function calculateType() {
      let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
      answers.forEach(answer => {
        for (let [key, val] of Object.entries(answer.selectedScore)) { scores[key] += val; }
      });

      const type = [
        scores.E >= scores.I ? 'E' : 'I',
        scores.S >= scores.N ? 'S' : 'N',
        scores.T >= scores.F ? 'T' : 'F',
        scores.J >= scores.P ? 'J' : 'P',
      ].join('');

      const makePct = (a, b) => {
        const total = a + b;
        return total ? Math.round((a / total) * 100) : 50;
      };

      const percentages = {
        EI: { left: 'E', right: 'I', leftPct: makePct(scores.E, scores.I), rightPct: makePct(scores.I, scores.E) },
        SN: { left: 'S', right: 'N', leftPct: makePct(scores.S, scores.N), rightPct: makePct(scores.N, scores.S) },
        TF: { left: 'T', right: 'F', leftPct: makePct(scores.T, scores.F), rightPct: makePct(scores.F, scores.T) },
        JP: { left: 'J', right: 'P', leftPct: makePct(scores.J, scores.P), rightPct: makePct(scores.P, scores.J) },
      };

      return { type, scores, percentages };
    }

    function showResults() {
      const { type, percentages } = calculateType();
      const desc = typeDescriptions[type] || {
        nickname: "独特的你", emoji: "✨",
        description: "你的性格组合非常独特，融合了多种特质。每一种人格都有其独特的价值——拥抱你自己的与众不同。"
      };

      document.getElementById('result-type').textContent = type;
      document.getElementById('result-nickname').textContent = desc.emoji + ' ' + desc.nickname;
      document.getElementById('result-description').textContent = desc.description;

      const dimsContainer = document.getElementById('result-dimensions');
      dimsContainer.innerHTML = '';

      const dimLabels = {
        EI: { left: '外向 E', right: 'I 内向' },
        SN: { left: '实感 S', right: 'N 直觉' },
        TF: { left: '思考 T', right: 'F 情感' },
        JP: { left: '判断 J', right: 'P 感知' },
      };

      ['EI', 'SN', 'TF', 'JP'].forEach(key => {
        const dim = percentages[key];
        const labels = dimLabels[key];
        const row = document.createElement('div');
        row.className = 'dimension-row';
        row.innerHTML = `
          <span class="dimension-label left">${labels.left}</span>
          <div class="dimension-bar-wrap">
            <div class="dimension-bar-fill" style="width: 0%;" data-width="${dim.leftPct}%"></div>
            <div class="dimension-bar-fill muted" style="width: 0%;" data-width="${dim.rightPct}%"></div>
          </div>
          <span class="dimension-label right">${labels.right}</span>
        `;
        dimsContainer.appendChild(row);
      });

      showSection(sectionResults);
      sectionResults.scrollIntoView({ behavior: 'smooth', block: 'start' });

      setTimeout(() => {
        document.querySelectorAll('.dimension-bar-fill').forEach(bar => {
          bar.style.width = bar.getAttribute('data-width');
        });
      }, 300);

      window._lastResult = { type, desc };
    }

    // ==========================================
    // 分享
    // ==========================================
    document.getElementById('btn-share').addEventListener('click', () => {
      const { type, desc } = window._lastResult || {};
      if (!type) return;

      const shareText = `我在 MBTI 性格测试中测出了 ${type}（${desc.nickname}）！来看看你是什么类型？`;
      const shareUrl = window.location.href;

      if (navigator.share) {
        navigator.share({
          title: `我的 MBTI 类型：${type}`,
          text: shareText,
          url: shareUrl,
        }).catch(err => {
          if (err.name !== 'AbortError') copyToClipboard(shareText + ' ' + shareUrl);
        });
      } else {
        copyToClipboard(shareText + ' ' + shareUrl);
      }
    });

    function copyToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => showToast('链接已复制！分享给你的朋友吧'));
      } else {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); showToast('链接已复制！分享给你的朋友吧'); }
        catch (e) { showToast('请手动复制链接分享给朋友'); }
        document.body.removeChild(ta);
      }
    }

    // ==========================================
    // Toast
    // ==========================================
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // ==========================================
    // 重新测试
    // ==========================================
    document.getElementById('btn-retake').addEventListener('click', () => {
      currentIndex = 0; answers = []; window._lastResult = null;
      renderQuestion(0);
      showSection(sectionQuiz);
      sectionQuiz.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // ==========================================
    // 页面导航按钮
    // ==========================================

    // 首页 → 开始测试
    document.getElementById('btn-start').addEventListener('click', () => {
      currentIndex = 0; answers = [];
      renderQuestion(0);
      showSection(sectionQuiz);
      sectionQuiz.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // 首页 → 查看16型人格
    document.getElementById('btn-view-types').addEventListener('click', () => {
      renderTypesGrid();
      showSection(sectionTypes);
      sectionTypes.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // 16型页 → 返回首页
    document.getElementById('btn-back-from-types').addEventListener('click', () => {
      showSection(sectionHero);
      sectionHero.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // ==========================================
    // 渲染16型人格卡片网格
    // ==========================================
    function renderTypesGrid() {
      const grid = document.getElementById('types-grid');
      if (grid.children.length > 0) return; // 已渲染过，不重复

      const typeOrder = [
        "INTJ", "INTP", "ENTJ", "ENTP",
        "INFJ", "INFP", "ENFJ", "ENFP",
        "ISTJ", "ISFJ", "ESTJ", "ESFJ",
        "ISTP", "ISFP", "ESTP", "ESFP"
      ];

      typeOrder.forEach(code => {
        const info = typeDescriptions[code];
        const card = document.createElement('div');
        card.className = 'type-card';
        card.innerHTML = `
          <span class="type-card-emoji">${info.emoji}</span>
          <div class="type-card-code">${code}</div>
          <div class="type-card-nickname">${info.nickname}</div>
          <p class="type-card-desc">${info.short}</p>
        `;
        grid.appendChild(card);
      });
    }

    // ==========================================
    // 键盘操作
    // ==========================================
    document.addEventListener('keydown', (e) => {
      if (!sectionQuiz.classList.contains('active')) return;
      if (e.key === '1' || e.key === '2') {
        const optIndex = parseInt(e.key) - 1;
        if (optIndex < quizData.questions[currentIndex].options.length) {
          selectOption(currentIndex, optIndex);
        }
      }
      if (e.key === 'ArrowLeft') document.getElementById('btn-prev').click();
      if (e.key === 'ArrowRight' || e.key === 'Enter') document.getElementById('btn-next').click();
    });

    console.log('✨ MBTI 性格测试 v2 — 活力渐变版');
    console.log('   背景: 紫罗兰-靛蓝-深海蓝 多层渐变');
    console.log('   新增: 16型人格独立介绍页');
  </script>
</body>
</html>
